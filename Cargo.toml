[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/eval",
    "crates/store-clickhouse",
    "crates/store-postgres",
    "crates/pipeline",
    "crates/web",
    "bin/rules-engine",
]

[workspace.package]
edition = "2021"
rust-version = "1.94"
license = "MIT"

[workspace.dependencies]
# Kept central so versions are pinned once. Extended by later steps
# (tokio, axum, rdkafka, sqlx, clickhouse, cel-interpreter…).
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
