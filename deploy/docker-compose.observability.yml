# Observability overlay — run alongside the main compose to enable SigNoz:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.observability.yml up -d
#
# SigNoz UI: http://localhost:3301
# Switch backend: change OTEL_EXPORTER_OTLP_ENDPOINT in deploy/docker-compose.yml

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: rre-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "24224:24224"
    depends_on:
      - signoz-otelcollector

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: rre-signoz-clickhouse
    environment:
      CLICKHOUSE_DB: signoz_metrics
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: ${SIGNOZ_CH_PASSWORD:-27ff0399-0d3a-4bd8-919d-17c2181e6fb9}
    volumes:
      - rre-signoz-ch-data:/var/lib/clickhouse
      - ./signoz-clickhouse-config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./signoz-clickhouse-users.xml:/etc/clickhouse-server/users.d/allow_json.xml:ro
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "admin",
             "--password", "${SIGNOZ_CH_PASSWORD:-27ff0399-0d3a-4bd8-919d-17c2181e6fb9}",
             "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  signoz-schema-migrator:
    image: signoz/signoz-schema-migrator:latest
    container_name: rre-signoz-schema-init
    command:
      - "sync"
      - "--dsn=tcp://admin:${SIGNOZ_CH_PASSWORD:-27ff0399-0d3a-4bd8-919d-17c2181e6fb9}@signoz-clickhouse:9000"
    depends_on:
      signoz-clickhouse:
        condition: service_healthy

  signoz-otelcollector:
    image: signoz/signoz-otel-collector:v0.144.5
    container_name: rre-signoz-otelcollector
    command:
      - "--config=/etc/otel/config.yaml"
    volumes:
      - ./signoz-otelcollector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      signoz-schema-migrator:
        condition: service_completed_successfully

  signoz:
    image: signoz/signoz:v0.129.0
    container_name: rre-signoz
    environment:
      STORAGE: clickhouse
      ClickHouseUrl: http://admin:${SIGNOZ_CH_PASSWORD:-27ff0399-0d3a-4bd8-919d-17c2181e6fb9}@signoz-clickhouse:8123
      SIGNOZ_LOCAL_DB_PATH: /var/lib/signoz/signoz.db
    ports:
      - "${SIGNOZ_PORT:-3301}:8080"
    volumes:
      - rre-signoz-data:/var/lib/signoz
    depends_on:
      - signoz-clickhouse
      - signoz-otelcollector

volumes:
  rre-signoz-ch-data:
  rre-signoz-data:
