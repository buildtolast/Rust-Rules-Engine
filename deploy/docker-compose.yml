services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: rre-redpanda
    command:
      - redpanda start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_PORT:-19092}
      - --advertise-kafka-addr=internal://redpanda:9092,external://host.docker.internal:${REDPANDA_PORT:-19092}
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
    ports:
      - "${REDPANDA_PORT:-19092}:${REDPANDA_PORT:-19092}"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: ${REDPANDA_MEM_LIMIT:-1500M}
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: rre-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ruleaudit
      CLICKHOUSE_USER: rules
      CLICKHOUSE_PASSWORD: rules
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - rre-clickhouse-data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: ${CLICKHOUSE_MEM_LIMIT:-2G}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  postgres:
    image: postgres:16
    container_name: rre-postgres
    command: ["postgres", "-p", "${POSTGRES_PORT:-5432}"]
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    environment:
      POSTGRES_DB: ruleaudit
      POSTGRES_USER: rules
      POSTGRES_PASSWORD: rules
    volumes:
      - rre-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-512M}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_PORT:-5432} -U rules -d ruleaudit || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  app:
    image: rre/rules-engine:latest
    container_name: rre-app
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://rules:rules@postgres:5432/ruleaudit
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: ruleaudit
      CLICKHOUSE_USER: rules
      CLICKHOUSE_PASSWORD: rules
      KAFKA_BROKERS: redpanda:9092
      SOURCE_TOPIC: ${SOURCE_TOPIC:-source-events}
      TARGET_TOPIC: ${TARGET_TOPIC:-target-events}
      CONSUMER_GROUP: ${CONSUMER_GROUP:-rules-engine}
      TRANSACTIONAL_ID: ${TRANSACTIONAL_ID:-rules-engine-txn}
      HTTP_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    deploy:
      resources:
        limits:
          memory: ${APP_MEM_LIMIT:-512M}

  frontend:
    image: rre/frontend:latest
    container_name: rre-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      NGINX_PORT: 80
      BACKEND_URL: http://app:8080
      SRE_URL: http://sre-agent:8088
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-64M}

  sre-agent:
    image: rre/sre-agent:latest
    container_name: rre-sre-agent
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sre
    ports:
      - "${SRE_PORT:-8088}:8088"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: ruleaudit
      CLICKHOUSE_USER: rules
      CLICKHOUSE_PASSWORD: rules
      LLM_BASE_URL: http://host.docker.internal:8888
      LLM_MODEL: ${LLM_MODEL:-unsloth}
      LLM_API_KEY: ${UNSLOTH_API_KEY:-}
      SCAN_INTERVAL_SECS: ${SCAN_INTERVAL_SECS:-60}
      LOG_TAIL_LINES: ${LOG_TAIL_LINES:-200}
      RUST_LOG: info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    deploy:
      resources:
        limits:
          memory: ${SRE_MEM_LIMIT:-256M}

volumes:
  rre-clickhouse-data:
  rre-postgres-data:
