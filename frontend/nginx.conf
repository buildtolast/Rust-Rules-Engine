upstream backend {
    server app:8080;
    keepalive 32;
}

upstream sre {
    server sre-agent:8088;
    keepalive 16;
}

server {
    listen ${NGINX_PORT};
    server_name localhost;

    # ── Static frontend ──────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Export: streaming CSV — bypass buffering, generous timeout ───────────
    # Must come before the general /api block (longest prefix wins).
    location /api/reports/export {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── SRE remediation pipeline (host-side script, SSE) ─────────────────────
    # sre-remediate.py --serve runs on the host at port 8089.
    # host.docker.internal resolves to the Docker host on macOS/Windows.
    location /api/remediate {
        proxy_pass http://host.docker.internal:8089/remediate;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── SRE standalone dashboard ─────────────────────────────────────────────
    # Proxies the SRE agent's self-contained dark-mode dashboard.
    # Useful when the main React frontend is down.
    location = /sre {
        proxy_pass http://sre/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # ── SRE system readiness probe ───────────────────────────────────────────
    # Proxied from the browser; sre-agent:8088 is not directly reachable.
    location = /api/system/ready {
        proxy_pass http://sre/api/system/ready;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── SRE agent — SSE and status endpoints ─────────────────────────────────
    # Must come before /api so the more specific prefix wins.
    location /api/sre/ {
        proxy_pass http://sre;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        # Must exceed the SSE keepalive interval (25 s) with a comfortable margin.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── General API ──────────────────────────────────────────────────────────
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 16 × 64 KB = 1 MB in-memory buffer; typical JSON responses fit without
        # spilling to disk. The /api/reports/export location above bypasses this.
        proxy_buffer_size        64k;
        proxy_buffers            16 64k;
        proxy_busy_buffers_size  128k;
        proxy_read_timeout       120s;
        proxy_send_timeout       120s;
    }

    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
